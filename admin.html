<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>এডমিন প্যানেল | আল ইনতিবাহ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0d3b2e;
      --secondary: #b78a2f;
      --bg: #f7f4eb;
      --surface: #ffffff;
      --border: rgba(13, 59, 46, 0.16);
      --text: #163127;
      --muted: #5f6f67;
      --danger: #9f2d2d;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Hind Siliguri", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .container {
      width: min(920px, calc(100% - 24px));
      margin: 32px auto 52px;
    }

    .panel,
    .notice-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 14px 36px rgba(8, 36, 28, 0.09);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--primary);
    }

    p.helper {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label { font-weight: 700; }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
    }

    textarea { min-height: 120px; resize: vertical; }

    .editor-box {
      margin-top: 26px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .editor-grid {
      display: grid;
      gap: 12px;
    }

    .simple-editor {
      display: grid;
      gap: 12px;
      margin-top: 6px;
      max-height: 460px;
      overflow: auto;
      padding-right: 6px;
    }

    .simple-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
    }

    .simple-item small {
      display: block;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .editor-mode {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      margin: 4px 0 2px;
    }

    .editor-mode label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
    }

    .code-editor {
      min-height: 340px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.92rem;
      line-height: 1.6;
      white-space: pre;
    }

    .hidden {
      display: none;
    }

    .actions,
    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .top-actions {
      margin-bottom: 14px;
      justify-content: space-between;
      align-items: center;
    }

    button, .link-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: rgba(13, 59, 46, 0.12); color: var(--primary); }
    .btn-danger { background: rgba(159, 45, 45, 0.12); color: var(--danger); }

    .notices {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    .notice-item h3 {
      margin: 0 0 6px;
      color: var(--primary);
    }

    .meta {
      font-size: 0.92rem;
      color: var(--secondary);
      font-weight: 700;
      margin-bottom: 6px;
      display: block;
    }

    .top-link {
      display: inline-block;
      margin-top: 12px;
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    .status {
      margin: 6px 0 0;
      color: var(--danger);
      font-weight: 600;
    }

    .login-box {
      max-width: 480px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="panel login-box" id="loginPanel">
      <h1>এডমিন লগইন</h1>
      <p class="helper">এডমিন প্যানেলে ঢুকতে আপনার Firebase Auth ইমেইল ও পাসওয়ার্ড ব্যবহার করুন।</p>

      <form id="loginForm">
        <div class="field">
          <label for="email">ইমেইল</label>
          <input id="email" type="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">পাসওয়ার্ড</label>
          <input id="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="actions">
          <button class="btn-primary" type="submit">লগইন</button>
        </div>
        <p class="status" id="loginStatus"></p>
      </form>
    </section>

    <section class="panel hidden" id="adminPanel">
      <div class="top-actions">
        <div>
          <h1>এডমিন প্যানেল</h1>
          <p class="helper">লগইন করা এডমিন এখান থেকে নোটিশ যোগ/মুছতে পারবেন।</p>
        </div>
        <button class="btn-danger" type="button" id="logoutBtn">লগআউট</button>
      </div>

      <form id="noticeForm">
        <div class="field">
          <label for="noticeTitle">নোটিশ শিরোনাম</label>
          <input id="noticeTitle" type="text" required>
        </div>
        <div class="field">
          <label for="noticeDate">তারিখ</label>
          <input id="noticeDate" type="date" required>
        </div>
        <div class="field">
          <label for="noticeMessage">বিস্তারিত</label>
          <textarea id="noticeMessage" required></textarea>
        </div>
        <div class="actions">
          <button class="btn-primary" type="submit">নোটিশ যোগ করো</button>
          <button class="btn-secondary" type="button" id="resetNotices">ডিফল্টে ফেরত</button>
        </div>
      </form>

      <div class="notices" id="adminNoticeList"></div>

      <section class="editor-box">
        <h2>ফাইল এডিটর</h2>
        <p class="helper">সাধারণভাবে টেক্সট বদলাতে “সহজ মোড” ব্যবহার করুন। কোড জানলে “অ্যাডভান্সড মোড” থেকে HTML এডিট করতে পারবেন।</p>

        <div class="editor-grid">
          <div class="field">
            <label for="filePicker">ফাইল নির্বাচন</label>
            <select id="filePicker"></select>
          </div>

          <div class="editor-mode">
            <label><input type="radio" name="editorMode" value="simple" checked> সহজ মোড</label>
            <label><input type="radio" name="editorMode" value="advanced"> অ্যাডভান্সড (HTML)</label>
          </div>

          <div class="actions">
            <button class="btn-secondary" id="loadFileBtn" type="button">ফাইল লোড</button>
            <button class="btn-primary" id="saveDraftBtn" type="button">খসড়া সেভ</button>
            <button class="btn-secondary" id="previewFileBtn" type="button">প্রিভিউ</button>
            <button class="btn-secondary" id="downloadFileBtn" type="button">ডাউনলোড</button>
            <button class="btn-danger" id="resetDraftBtn" type="button">খসড়া বাতিল</button>
          </div>

          <div class="field" id="simpleEditorWrap">
            <label>সহজ টেক্সট এডিট</label>
            <div class="simple-editor" id="simpleEditor"></div>
          </div>

          <div class="field hidden" id="advancedEditorWrap">
            <label for="fileEditor">ফাইল কনটেন্ট</label>
            <textarea id="fileEditor" class="code-editor" spellcheck="false" placeholder="ফাইল লোড করলে কনটেন্ট এখানে দেখাবে..."></textarea>
          </div>
          <p class="status" id="editorStatus"></p>
        </div>
      </section>
      <a class="top-link" href="index.html">← হোম পেজে ফিরে যাও</a>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDxJSBLbuunfTF7gbkNL2g8-fNXdsIejFI",
      authDomain: "jamiatululoomilislamiadhaka.firebaseapp.com",
      projectId: "jamiatululoomilislamiadhaka",
      storageBucket: "jamiatululoomilislamiadhaka.firebasestorage.app",
      messagingSenderId: "172395531641",
      appId: "1:172395531641:web:27e451c2700a9f3debb3a8",
      measurementId: "G-YDG45LK4C6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const key = "juid_notices";
    const defaults = [
      {
        title: "রমজান মাসের বিশেষ ক্লাস সময়সূচি",
        date: "2026-03-02",
        message: "ফজরের পর এবং আসরের পর অতিরিক্ত দরস অনুষ্ঠিত হবে। সকল ছাত্রকে সময়মত উপস্থিত থাকার অনুরোধ করা হচ্ছে।"
      },
      {
        title: "ভর্তি ফর্ম জমা দেওয়ার শেষ তারিখ",
        date: "2026-04-20",
        message: "নতুন শিক্ষাবর্ষের ভর্তি ফর্ম ২০ এপ্রিল ২০২৬ তারিখ পর্যন্ত অফিসে জমা নেওয়া হবে।"
      }
    ];

    const loginPanel = document.getElementById("loginPanel");
    const adminPanel = document.getElementById("adminPanel");
    const loginForm = document.getElementById("loginForm");
    const loginStatus = document.getElementById("loginStatus");
    const logoutBtn = document.getElementById("logoutBtn");

    const form = document.getElementById("noticeForm");
    const list = document.getElementById("adminNoticeList");
    const filePicker = document.getElementById("filePicker");
    const loadFileBtn = document.getElementById("loadFileBtn");
    const saveDraftBtn = document.getElementById("saveDraftBtn");
    const previewFileBtn = document.getElementById("previewFileBtn");
    const downloadFileBtn = document.getElementById("downloadFileBtn");
    const resetDraftBtn = document.getElementById("resetDraftBtn");
    const fileEditor = document.getElementById("fileEditor");
    const editorStatus = document.getElementById("editorStatus");
    const simpleEditor = document.getElementById("simpleEditor");
    const simpleEditorWrap = document.getElementById("simpleEditorWrap");
    const advancedEditorWrap = document.getElementById("advancedEditorWrap");
    const editorModeInputs = document.querySelectorAll("input[name='editorMode']");

    const editableFiles = [
      "index.html",
      "history-of-jamia.html",
      "our-jamia.html",
      "nesab-analysis.html",
      "taranaye-jamia.html",
      "teachers-directory.html",
      "admin.html"
    ];

    let workingDoc = null;
    let workingFile = "";
    let currentEditorMode = "simple";
    const simpleEditableSelectors = "h1,h2,h3,h4,h5,h6,p,a,button,label,li,span";

    function getNotices() {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return [...defaults];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [...defaults];
      } catch (_) {
        return [...defaults];
      }
    }

    function saveNotices(notices) {
      localStorage.setItem(key, JSON.stringify(notices));
    }

    function draftKey(fileName) {
      return `juid_file_draft_${fileName}`;
    }

    function updateEditorStatus(message, isError = false) {
      editorStatus.textContent = message;
      editorStatus.style.color = isError ? "var(--danger)" : "var(--primary)";
    }

    function getSelectedFileName() {
      return filePicker.value;
    }

    function getEditorContent() {
      if (currentEditorMode === "simple" && workingDoc) {
        return `<!DOCTYPE html>\n${workingDoc.documentElement.outerHTML}`;
      }
      return fileEditor.value;
    }

    function setEditorContent(content) {
      fileEditor.value = content;
    }

    function sanitizeText(text) {
      return text.replace(/\s+/g, " ").trim();
    }

    function rebuildSimpleEditor() {
      if (!workingDoc) return;

      const nodes = [...workingDoc.body.querySelectorAll(simpleEditableSelectors)]
        .filter((node) => !node.closest("script,style,noscript"))
        .filter((node) => sanitizeText(node.textContent || "").length > 0)
        .slice(0, 250);

      if (!nodes.length) {
        simpleEditor.innerHTML = "<div class='simple-item'>এই ফাইলে সহজে এডিট করার মতো টেক্সট পাওয়া যায়নি।</div>";
        return;
      }

      simpleEditor.innerHTML = nodes.map((node, index) => {
        const text = sanitizeText(node.textContent || "");
        const safeText = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
        return `
          <div class="simple-item">
            <small>${node.tagName.toLowerCase()} #${index + 1}</small>
            <textarea data-edit-index="${index}" rows="3">${safeText}</textarea>
          </div>
        `;
      }).join("");

      const fields = simpleEditor.querySelectorAll("textarea[data-edit-index]");
      fields.forEach((field) => {
        field.addEventListener("input", (event) => {
          const fieldIndex = Number(event.target.dataset.editIndex);
          const targetNode = nodes[fieldIndex];
          if (!targetNode) return;
          targetNode.textContent = event.target.value;
          setEditorContent(getEditorContent());
        });
      });
    }

    function loadPickerOptions() {
      filePicker.innerHTML = editableFiles
        .map((file) => `<option value="${file}">${file}</option>`)
        .join("");
    }

    async function loadFileContent() {
      const fileName = getSelectedFileName();
      if (!fileName) return;

      const savedDraft = localStorage.getItem(draftKey(fileName));
      if (savedDraft !== null) {
        setEditorContent(savedDraft);
        workingDoc = new DOMParser().parseFromString(savedDraft, "text/html");
        workingFile = fileName;
        rebuildSimpleEditor();
        updateEditorStatus(`${fileName} এর সেভ করা খসড়া লোড হয়েছে।`);
        return;
      }

      try {
        const response = await fetch(fileName, { cache: "no-store" });
        if (!response.ok) throw new Error("ফাইল লোড করা যায়নি");
        const content = await response.text();
        setEditorContent(content);
        const parsed = new DOMParser().parseFromString(content, "text/html");
        workingDoc = parsed;
        workingFile = fileName;
        rebuildSimpleEditor();
        updateEditorStatus(`${fileName} ফাইল লোড হয়েছে।`);
      } catch (_) {
        updateEditorStatus(`${fileName} ফাইল লোড ব্যর্থ হয়েছে।`, true);
      }
    }

    function saveDraft() {
      const fileName = getSelectedFileName();
      if (!fileName) return;
      localStorage.setItem(draftKey(fileName), getEditorContent());
      updateEditorStatus(`${fileName} এর খসড়া সেভ হয়েছে।`);
    }

    function resetDraft() {
      const fileName = getSelectedFileName();
      if (!fileName) return;
      localStorage.removeItem(draftKey(fileName));
      loadFileContent();
      updateEditorStatus(`${fileName} এর সেভ করা খসড়া বাতিল হয়েছে।`);
    }

    function previewDraft() {
      const fileName = getSelectedFileName();
      if (!fileName) return;
      const blob = new Blob([getEditorContent()], { type: "text/html" });
      const previewUrl = URL.createObjectURL(blob);
      window.open(previewUrl, "_blank", "noopener");
      updateEditorStatus(`${fileName} এর প্রিভিউ নতুন ট্যাবে খোলা হয়েছে।`);
      setTimeout(() => URL.revokeObjectURL(previewUrl), 60000);
    }

    function downloadDraft() {
      const fileName = getSelectedFileName();
      if (!fileName) return;
      const blob = new Blob([getEditorContent()], { type: "text/html" });
      const downloadUrl = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = downloadUrl;
      anchor.download = fileName;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(downloadUrl);
      updateEditorStatus(`${fileName} ডাউনলোড শুরু হয়েছে।`);
    }

    function switchEditorMode(mode) {
      currentEditorMode = mode;
      const isSimple = mode !== "advanced";
      simpleEditorWrap.classList.toggle("hidden", !isSimple);
      advancedEditorWrap.classList.toggle("hidden", isSimple);
      if (mode === "simple" && fileEditor.value) {
        workingDoc = new DOMParser().parseFromString(fileEditor.value, "text/html");
        rebuildSimpleEditor();
      }
      updateEditorStatus(isSimple
        ? "সহজ মোড চালু আছে। টেক্সট বক্সে লিখেই এডিট করুন।"
        : "অ্যাডভান্সড মোড চালু আছে। এখানে সরাসরি HTML এডিট করতে পারেন।");
    }

    function render() {
      const notices = getNotices();

      if (!notices.length) {
        list.innerHTML = "<div class='notice-item'>কোনো নোটিশ পাওয়া যায়নি।</div>";
        return;
      }

      list.innerHTML = notices
        .map((notice, index) => `
          <article class="notice-item">
            <h3>${notice.title}</h3>
            <span class="meta">তারিখ: ${notice.date}</span>
            <p>${notice.message}</p>
            <button type="button" class="btn-danger" data-index="${index}">মুছে ফেলো</button>
          </article>
        `)
        .join("");
    }

    function togglePanels(isLoggedIn) {
      loginPanel.classList.toggle("hidden", isLoggedIn);
      adminPanel.classList.toggle("hidden", !isLoggedIn);
      if (isLoggedIn) render();
    }

    loginForm.addEventListener("submit", async function (event) {
      event.preventDefault();
      loginStatus.textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        loginForm.reset();
      } catch (error) {
        loginStatus.textContent = "লগইন ব্যর্থ। ইমেইল/পাসওয়ার্ড সঠিক কিনা যাচাই করুন।";
      }
    });

    logoutBtn.addEventListener("click", async function () {
      await signOut(auth);
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const title = document.getElementById("noticeTitle").value.trim();
      const date = document.getElementById("noticeDate").value;
      const message = document.getElementById("noticeMessage").value.trim();
      if (!title || !date || !message) return;

      const notices = getNotices();
      notices.unshift({ title, date, message });
      saveNotices(notices);
      form.reset();
      render();
    });

    list.addEventListener("click", function (event) {
      const btn = event.target.closest("button[data-index]");
      if (!btn) return;

      const notices = getNotices();
      const index = Number(btn.dataset.index);
      if (Number.isNaN(index)) return;

      notices.splice(index, 1);
      saveNotices(notices);
      render();
    });

    document.getElementById("resetNotices").addEventListener("click", function () {
      saveNotices([...defaults]);
      render();
    });

    loadPickerOptions();
    loadFileContent();
    switchEditorMode("simple");

    filePicker.addEventListener("change", loadFileContent);
    loadFileBtn.addEventListener("click", loadFileContent);
    saveDraftBtn.addEventListener("click", saveDraft);
    previewFileBtn.addEventListener("click", previewDraft);
    downloadFileBtn.addEventListener("click", downloadDraft);
    resetDraftBtn.addEventListener("click", resetDraft);
    editorModeInputs.forEach((input) => {
      input.addEventListener("change", (event) => {
        switchEditorMode(event.target.value);
      });
    });

    onAuthStateChanged(auth, (user) => {
      togglePanels(Boolean(user));
      if (!user) loginStatus.textContent = "";
    });
  </script>
</body>
</html>
