<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ছাত্র তালিকা ব্যবস্থাপনা</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0d3b2e;
      --accent: #b78a2f;
      --bg: #f7f4eb;
      --surface: #ffffff;
      --border: rgba(13, 59, 46, 0.14);
      --text: #173228;
      --muted: #607066;
      --danger: #9f2d2d;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hind Siliguri", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      width: min(1100px, calc(100% - 24px));
      margin: 26px auto 40px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 14px 36px rgba(8, 36, 28, 0.08);
      padding: 18px;
    }

    h1 {
      margin: 0;
      color: var(--primary);
    }

    .helper {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .form-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-weight: 700;
      color: var(--primary);
    }

    input {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      width: 100%;
      background: #fff;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 15px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: rgba(13, 59, 46, 0.11); color: var(--primary); }
    .btn-danger { background: rgba(159, 45, 45, 0.12); color: var(--danger); }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      align-items: center;
    }

    .toolbar input {
      width: min(360px, 100%);
    }

    .badge {
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(13, 59, 46, 0.1);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 740px;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--primary);
      background: rgba(13, 59, 46, 0.05);
      font-size: 0.95rem;
    }

    .status {
      margin: 10px 0 0;
      font-weight: 700;
      color: var(--accent);
    }

    .empty {
      padding: 14px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: rgba(13, 59, 46, 0.03);
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel">
      <h1>ছাত্র তালিকা ব্যবস্থাপনা</h1>
      <p class="helper">এখানে নতুন ছাত্র যোগ করতে পারবেন, তথ্য সম্পাদনা করতে পারবেন, মুছতে পারবেন এবং নাম/ফোন/শ্রেণি দিয়ে সার্চ করতে পারবেন।</p>

      <form id="studentForm">
        <input type="hidden" id="studentId">
        <div class="form-grid">
          <div class="field">
            <label for="studentName">ছাত্রের নাম</label>
            <input id="studentName" required>
          </div>
          <div class="field">
            <label for="fatherName">বাবার নাম</label>
            <input id="fatherName" required>
          </div>
          <div class="field">
            <label for="address">ঠিকানা</label>
            <input id="address" required>
          </div>
          <div class="field">
            <label for="phone">ফোন নাম্বার</label>
            <input id="phone" inputmode="numeric" required>
          </div>
          <div class="field">
            <label for="className">শ্রেণি</label>
            <input id="className" required>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary" id="saveBtn">তথ্য সংরক্ষণ</button>
          <button type="button" class="btn-secondary" id="resetBtn">ফর্ম রিসেট</button>
        </div>
        <p class="status" id="statusText"></p>
      </form>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="searchInput" placeholder="সার্চ করুন: নাম, বাবার নাম, ফোন বা শ্রেণি...">
        <span class="badge" id="countBadge">মোট ছাত্র: 0</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ছাত্রের নাম</th>
              <th>বাবার নাম</th>
              <th>ঠিকানা</th>
              <th>ফোন নাম্বার</th>
              <th>শ্রেণি</th>
              <th>অ্যাকশন</th>
            </tr>
          </thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty">এখনও কোনো ছাত্রের তথ্য যোগ করা হয়নি।</div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "students_management_data_v1";

    const studentForm = document.getElementById("studentForm");
    const studentIdInput = document.getElementById("studentId");
    const studentNameInput = document.getElementById("studentName");
    const fatherNameInput = document.getElementById("fatherName");
    const addressInput = document.getElementById("address");
    const phoneInput = document.getElementById("phone");
    const classNameInput = document.getElementById("className");
    const resetBtn = document.getElementById("resetBtn");
    const saveBtn = document.getElementById("saveBtn");
    const statusText = document.getElementById("statusText");
    const studentTableBody = document.getElementById("studentTableBody");
    const searchInput = document.getElementById("searchInput");
    const countBadge = document.getElementById("countBadge");
    const emptyState = document.getElementById("emptyState");

    let students = loadStudents();

    function loadStudents() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveStudents() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
    }

    function resetForm() {
      studentForm.reset();
      studentIdInput.value = "";
      saveBtn.textContent = "তথ্য সংরক্ষণ";
    }

    function showStatus(message) {
      statusText.textContent = message;
      setTimeout(() => {
        if (statusText.textContent === message) {
          statusText.textContent = "";
        }
      }, 1800);
    }

    function makeRow(student) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${escapeHtml(student.studentName)}</td>
        <td>${escapeHtml(student.fatherName)}</td>
        <td>${escapeHtml(student.address)}</td>
        <td>${escapeHtml(student.phone)}</td>
        <td>${escapeHtml(student.className)}</td>
        <td>
          <div class="actions" style="margin-top:0;">
            <button type="button" class="btn-secondary" data-action="edit" data-id="${student.id}">এডিট</button>
            <button type="button" class="btn-danger" data-action="remove" data-id="${student.id}">রিমুভ</button>
          </div>
        </td>
      `;
      return tr;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderTable() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = students.filter((student) => {
        const text = `${student.studentName} ${student.fatherName} ${student.address} ${student.phone} ${student.className}`.toLowerCase();
        return text.includes(query);
      });

      studentTableBody.innerHTML = "";
      filtered.forEach((student) => {
        studentTableBody.appendChild(makeRow(student));
      });

      countBadge.textContent = `মোট ছাত্র: ${students.length}`;
      emptyState.style.display = filtered.length === 0 ? "block" : "none";
      emptyState.textContent = students.length === 0
        ? "এখনও কোনো ছাত্রের তথ্য যোগ করা হয়নি।"
        : "সার্চ অনুযায়ী কোনো তথ্য পাওয়া যায়নি।";
    }

    studentForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const payload = {
        studentName: studentNameInput.value.trim(),
        fatherName: fatherNameInput.value.trim(),
        address: addressInput.value.trim(),
        phone: phoneInput.value.trim(),
        className: classNameInput.value.trim()
      };

      if (Object.values(payload).some((value) => value.length === 0)) {
        showStatus("সবগুলো ঘর পূরণ করুন।");
        return;
      }

      const editingId = studentIdInput.value;
      if (editingId) {
        students = students.map((student) =>
          student.id === editingId ? { ...student, ...payload } : student
        );
        showStatus("তথ্য সফলভাবে আপডেট হয়েছে।");
      } else {
        students.unshift({ id: crypto.randomUUID(), ...payload });
        showStatus("নতুন ছাত্রের তথ্য যোগ করা হয়েছে।");
      }

      saveStudents();
      renderTable();
      resetForm();
    });

    resetBtn.addEventListener("click", () => {
      resetForm();
      showStatus("ফর্ম রিসেট করা হয়েছে।");
    });

    searchInput.addEventListener("input", renderTable);

    studentTableBody.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) {
        return;
      }

      const id = target.dataset.id;
      const action = target.dataset.action;
      const student = students.find((item) => item.id === id);

      if (!id || !action || !student) {
        return;
      }

      if (action === "edit") {
        studentIdInput.value = student.id;
        studentNameInput.value = student.studentName;
        fatherNameInput.value = student.fatherName;
        addressInput.value = student.address;
        phoneInput.value = student.phone;
        classNameInput.value = student.className;
        saveBtn.textContent = "আপডেট করুন";
        showStatus("এডিট মোড চালু হয়েছে।");
        studentNameInput.focus();
      }

      if (action === "remove") {
        const ok = window.confirm("এই ছাত্রের তথ্য মুছে ফেলতে চান?");
        if (!ok) {
          return;
        }
        students = students.filter((item) => item.id !== id);
        saveStudents();
        renderTable();
        if (studentIdInput.value === id) {
          resetForm();
        }
        showStatus("তথ্য মুছে ফেলা হয়েছে।");
      }
    });

    renderTable();
  </script>
</body>
</html>
